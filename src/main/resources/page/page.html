<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>狼人杀</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 120px;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        #start-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        #start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        #start-btn:active {
            transform: translateY(0);
        }

        #time-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            min-height: 400px;
            max-height: calc(100vh - 250px);
            overflow-y: auto;
        }

        .message-item {
            margin-top: 15px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-item.system {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
        }

        .message-type {
            flex: 0 0 80px;
            margin-right: 15px;
            font-weight: bold;
            display: flex;
            align-items: center;
            font-size: 14px;
        }

        .message-content {
            flex: 1;
            word-wrap: break-word;
            line-height: 1.6;
        }

        .input-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.98);
            padding: 20px;
            border-top: 2px solid #667eea;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
            text-align: center;
        }

        #text-input {
            width: 400px;
            padding: 12px 20px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            outline: none;
            transition: all 0.3s ease;
        }

        #text-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        #send-btn {
            padding: 12px 35px;
            font-size: 16px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            margin-left: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        #send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        #send-btn:active {
            transform: translateY(0);
        }

        /* 滚动条美化 */
        #time-container::-webkit-scrollbar {
            width: 8px;
        }

        #time-container::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        #time-container::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
        }

        #time-container::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }
    </style>
</head>
<body>
    <button id="start-btn">开始游戏</button>
    <h1>🐺 狼人杀 🐺</h1>
    <div id="time-container"></div>

    <script>
        // 建立 SSE 连接
        const eventSource = new EventSource('http://localhost:8080/sse/stream?userId=user_001');

        // 监听默认的消息事件
        eventSource.onmessage = function(event) {
            const data = JSON.parse(event.data);
            const newDiv = document.createElement('div');
            newDiv.className = 'message-item';
            
            if (data.type === 'system') {
                newDiv.classList.add('system');
            }
            
            const typeDiv = document.createElement('div');
            typeDiv.className = 'message-type';
            typeDiv.innerText = data.type;
            
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message-content';
            messageDiv.innerText = data.message;
            
            newDiv.appendChild(typeDiv);
            newDiv.appendChild(messageDiv);
            document.getElementById('time-container').appendChild(newDiv);
            
            // 自动滚动到底部
            const container = document.getElementById('time-container');
            container.scrollTop = container.scrollHeight;
        };

        // 监听连接错误
        eventSource.onerror = function(error) {
            console.error('SSE连接发生错误:', error);
        };

        // 开始按钮点击事件
        document.getElementById('start-btn').addEventListener('click', function() {
            fetch('http://localhost:8080/user/start', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    userId: 'user_001',
                    text: ''
                })
            })
            .then(response => console.log('开始游戏成功'));
        });

        // 确定按钮点击事件
        function sendText() {
            const textInput = document.getElementById('text-input');
            const text = textInput.value;
            
            if (!text.trim()) {
                alert('请输入内容');
                return;
            }

            fetch('http://localhost:8080/user/text', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    userId: 'user_001',
                    text: text
                })
            })
            .then(response => response.text())
            .then(data => {
                console.log('发送成功:', data);
                textInput.value = '';
                textInput.focus();
            });
        }

        // 回车键发送
        document.getElementById('text-input').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                sendText();
            }
        });
    </script>
    <div class="input-container">
        <input type="text" id="text-input" placeholder="输入你的消息..." />
        <button id="send-btn" onclick="sendText()">发送</button>
    </div>
</body>
</html>
