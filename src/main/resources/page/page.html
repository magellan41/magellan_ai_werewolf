<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>狼人杀</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
        }

        h1 {
            color: #e0e0e0;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        #start-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            background: #16213e;
            color: #e0e0e0;
            border: 1px solid #0f3460;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #start-btn:hover {
            background: #0f3460;
            border-color: #533483;
        }

        #start-btn:active {
            background: #533483;
        }

        #dialog-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #16213e;
            border-radius: 4px;
            border: 1px solid #0f3460;
            height: 80%;
            display: flex;
            flex-direction: column;
        }

        #message-list {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .message-item {
            margin-top: 12px;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            border: 1px solid #0f3460;
            border-radius: 4px;
            background: #1a1a2e;
            animation: slideIn 0.2s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-item.system {
            background: #0f3460;
            color: #e0e0e0;
            border: 1px solid #533483;
        }

        .message-type {
            flex: 0 0 80px;
            margin-right: 15px;
            font-weight: bold;
            display: flex;
            align-items: center;
            font-size: 13px;
            color: #533483;
        }

        .message-content {
            flex: 1;
            word-wrap: break-word;
            line-height: 1.6;
        }

        .input-container {
            padding: 15px;
            background: #1a1a2e;
            border-radius: 4px;
            text-align: center;
            border-top: 1px solid #0f3460;
            flex-shrink: 0;
        }

        #text-input {
            width: 400px;
            padding: 10px 15px;
            font-size: 14px;
            border: 1px solid #0f3460;
            border-radius: 4px;
            outline: none;
            background: #16213e;
            color: #e0e0e0;
            transition: all 0.2s ease;
        }

        #text-input:focus {
            border-color: #533483;
            box-shadow: 0 0 5px rgba(83, 52, 131, 0.3);
        }

        #text-input::placeholder {
            color: #666;
        }

        #send-btn {
            padding: 10px 25px;
            font-size: 14px;
            font-weight: bold;
            background: #0f3460;
            color: #e0e0e0;
            border: 1px solid #533483;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 10px;
            transition: all 0.2s ease;
        }

        #send-btn:hover {
            background: #533483;
            border-color: #7b52b9;
        }

        #send-btn:active {
            background: #7b52b9;
        }

        /* 滚动条样式 */
        #message-list::-webkit-scrollbar {
            width: 6px;
        }

        #message-list::-webkit-scrollbar-track {
            background: #1a1a2e;
        }

        #message-list::-webkit-scrollbar-thumb {
            background: #0f3460;
            border-radius: 3px;
        }

        #message-list::-webkit-scrollbar-thumb:hover {
            background: #533483;
        }
    </style>
</head>
<body>
    <button id="start-btn">开始游戏</button>
    <h1>狼人杀</h1>
    <div id="dialog-container">
        <div id="message-list"></div>
        
        <div class="input-container">
            <input type="text" id="text-input" placeholder="输入你的消息..." />
            <button id="send-btn" onclick="sendText()">发送</button>
        </div>
    </div>

    <script>
        // 建立 SSE 连接
        const eventSource = new EventSource('http://localhost:8080/sse/stream?userId=user_001');

        // 监听默认的消息事件
        eventSource.onmessage = function(event) {
            const data = JSON.parse(event.data);
            const newDiv = document.createElement('div');
            newDiv.className = 'message-item';
            
            if (data.type === 'system') {
                newDiv.classList.add('system');
            }
            
            const typeDiv = document.createElement('div');
            typeDiv.className = 'message-type';
            typeDiv.innerText = data.type;
            
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message-content';
            messageDiv.innerText = data.message;
            
            newDiv.appendChild(typeDiv);
            newDiv.appendChild(messageDiv);
            document.getElementById('message-list').appendChild(newDiv);
            
            // 自动滚动到底部
            const messageList = document.getElementById('message-list');
            messageList.scrollTop = messageList.scrollHeight;
        };

        // 监听连接错误
        eventSource.onerror = function(error) {
            console.error('SSE连接发生错误:', error);
        };

        // 开始按钮点击事件
        document.getElementById('start-btn').addEventListener('click', function() {
            fetch('http://localhost:8080/user/start', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    userId: 'user_001',
                    text: ''
                })
            })
            .then(response => console.log('开始游戏成功'));
        });

        // 确定按钮点击事件
        function sendText() {
            const textInput = document.getElementById('text-input');
            const text = textInput.value;
            
            if (!text.trim()) {
                alert('请输入内容');
                return;
            }

            fetch('http://localhost:8080/user/text', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    userId: 'user_001',
                    text: text
                })
            })
            .then(response => response.text())
            .then(data => {
                console.log('发送成功:', data);
                textInput.value = '';
                textInput.focus();
            });
        }

        // 回车键发送
        document.getElementById('text-input').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                sendText();
            }
        });
    </script>
</body>
</html>
